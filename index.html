<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b5e52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kids Gate – مساعد القبول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --emerald:#0b5e52;--emerald-mid:#0d7a6a;--emerald-bright:#12a08d;--emerald-light:#d4ede9;--emerald-xlight:#eef7f5;
  --gold:#b8860b;--gold-bright:#d4a017;--gold-light:#fdf3d0;--gold-warm:#f5c843;--gold-shine:#ffe066;
  --cream:#faf8f2;--white:#ffffff;
  --text:#0f1f1c;--text-mid:#2d4a45;--muted:#6b8c85;--border:#c8deda;
  --shadow-sm:0 2px 12px rgba(11,94,82,.08);--shadow-md:0 6px 30px rgba(11,94,82,.13);--shadow-lg:0 16px 60px rgba(11,94,82,.18);
  --r:16px;--rL:22px;--rXL:28px;
  --safe-bottom:env(safe-area-inset-bottom);
}
html,body{height:100%;background:var(--cream);color:var(--text);font-size:16px;line-height:1.6;overflow-x:hidden}
body.ar{font-family:'Cairo',sans-serif;direction:rtl}
body.en{font-family:'Nunito',sans-serif;direction:ltr}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes boing{0%,100%{transform:translateY(0)}45%{transform:translateY(-7px)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ring{0%,100%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(.96)}}
@keyframes chipIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── GATE ── */
#gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0b5e52 0%,#0d7a6a 40%,#0f9980 70%,#12a08d 100%);display:flex;flex-direction:column;overflow-y:auto}
#gate.gone{display:none}
.gate-blob{position:absolute;border-radius:50%;opacity:.12;pointer-events:none}
.gate-blob-1{width:300px;height:300px;background:#f5c843;top:-100px;right:-80px;animation:float 6s ease-in-out infinite}
.gate-blob-2{width:200px;height:200px;background:#fff;bottom:100px;left:-60px;animation:float 8s ease-in-out infinite reverse}
.gate-header{padding:20px 20px 0;display:flex;justify-content:center;position:relative;z-index:1}
.gate-lang-row{display:flex;gap:6px;background:rgba(255,255,255,.12);border-radius:30px;padding:4px;border:1px solid rgba(255,255,255,.2)}
.g-lang-btn{background:none;border:none;padding:6px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.75);cursor:pointer;border-radius:24px;transition:.2s;font-family:'Nunito',sans-serif}
.g-lang-btn.on{background:rgba(255,255,255,.92);color:var(--emerald)}
.gate-hero{flex:0 0 auto;padding:28px 24px 0;text-align:center;position:relative;z-index:1;animation:fadeUp .7s .1s both ease}
.gate-logo-wrap{display:inline-flex;align-items:center;justify-content:center;width:180px;height:80px;background:rgba(255,255,255,.95);border-radius:16px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.25);margin-bottom:16px;animation:float 4s ease-in-out infinite;overflow:hidden}
.gate-logo-wrap img{width:100%;height:100%;object-fit:contain;transition:transform .3s ease}
.gate-logo-wrap:hover img{transform:scale(1.05)}
.gate-tagline{font-size:13.5px;color:rgba(255,255,255,.78);line-height:1.65}
.gate-pill{display:inline-block;background:rgba(245,200,67,.22);border:1.5px solid rgba(245,200,67,.5);color:var(--gold-shine);font-size:11px;font-weight:700;padding:4px 16px;border-radius:20px;margin-top:10px;font-family:'Nunito',sans-serif;letter-spacing:.5px}
.gate-form-wrap{flex:1;margin-top:28px;background:var(--white);border-radius:32px 32px 0 0;padding:28px 22px 40px;box-shadow:0 -12px 50px rgba(0,0,0,.2);position:relative;z-index:1;animation:slideDown .5s .3s both ease}
.gate-form-handle{width:40px;height:4px;background:#e0e0e0;border-radius:4px;margin:0 auto 22px}.gate-form-title{font-size:19px;font-weight:900;color:var(--text);margin-bottom:4px}
.gate-form-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.field{margin-bottom:16px}
.field-label{font-size:12.5px;font-weight:700;color:var(--emerald);display:flex;align-items:center;gap:5px;margin-bottom:6px}
.field-input{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:14px;font-size:15px;color:var(--text);background:var(--cream);transition:.2s;font-family:'Cairo',sans-serif}
body.en .field-input{font-family:'Nunito',sans-serif}
.field-input:focus{outline:none;border-color:var(--emerald-bright);background:#fff;box-shadow:0 0 0 4px rgba(18,160,141,.1)}
.field-input.bad{border-color:#e53935;background:#fff8f8}
.field-err{font-size:11px;color:#e53935;margin-top:4px;display:none;padding-right:4px}
.field-err.show{display:block}
input[type=tel]{direction:ltr;text-align:left}
.gate-btn{width:100%;padding:16px;margin-top:8px;background:linear-gradient(135deg,var(--emerald) 0%,var(--emerald-mid) 100%);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight
